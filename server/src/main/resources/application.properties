# ============================================================================
#  Spring Boot configuration
#  This file controls how the app behaves at runtime. Spring reads it
#  automatically on startup. Lines starting with '#' are comments.
# ============================================================================

# A human-friendly name for the application (shows up in logs/metrics).
spring.application.name=recipe-server


# ----------------------------------------------------------------------------
#  DATABASE CONNECTION (PostgreSQL)
#  These tell Spring how to reach the Postgres database. The values must match
#  what we set in docker-compose.yml (same database name, user, and password).
#  The host is "localhost" and port 5432 because Docker maps the container's
#  Postgres port onto your machine.
# ----------------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/recipedb
spring.datasource.username=recipe
spring.datasource.password=recipe


# ----------------------------------------------------------------------------
#  JPA / HIBERNATE (the ORM that turns objects into table rows)
# ----------------------------------------------------------------------------

# "ddl-auto" controls whether Hibernate changes the database schema for you.
#   update  = look at your @Entity classes and CREATE or ALTER tables to match.
# This is very convenient while learning/developing (you don't hand-write SQL to
# create the "recipes" table — Hibernate does it from the Recipe class).
# NOTE: in a real production system you'd usually set this to "validate" and manage
# schema changes with a migration tool (Flyway/Liquibase) instead. "update" is a
# great starting point though.
spring.jpa.hibernate.ddl-auto=update

# When true, Hibernate prints the SQL statements it runs to the console. Extremely
# useful for learning — you can SEE the INSERT/SELECT queries your Java triggers.
spring.jpa.show-sql=true

# Pretty-prints that logged SQL across multiple lines so it's readable.
spring.jpa.properties.hibernate.format_sql=true
